  - name: PolitiFact
    url: https://www.politifact.com/rss/all/
  - name: Snopes
    url: https://www.snopes.com/feed/
  - name: FactCheck.org
    url: https://www.factcheck.org/feed/
  - name: Check Your Fact
    url: https://checkyourfact.com/feed/
  - name: Lead Stories
    url: https://leadstories.com/feed/
  - name: Media Bias/Fact Check
    url: https://mediabiasfactcheck.com/feed/

  # International
  - name: Full Fact (UK)
    url: https://fullfact.org/feed/
  - name: AFP Fact Check
    url: https://factcheck.afp.com/feed
  - name: BBC Reality Check
    url: https://feeds.bbci.co.uk/news/reality_check/rss.xml
  - name: CORRECTIV (Germany)
