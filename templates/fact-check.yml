name: Fact Check & Verification
description: Global fact-checking organizations, misinformation tracking, and media verification
language: both

keywords:
  - fact check
  - misinformation
  - disinformation
  - debunk
  - false claim
  - misleading
  - verification
  - 辟谣
  - 假新闻
  - 事实核查

polymarket:
  tags: ["politics", "misinformation"]

feeds:
